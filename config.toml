# Nostr Daily Bot Configuration
# ==============================

[relays]
# List of relay WebSocket URLs (at least one required)
urls = [
    "wss://relay.damus.io",
    "wss://nos.lol",
    "wss://relay.nostr.band",
]

[schedule]
# Cron expression for posting schedule
# Format: sec min hour day_of_month month day_of_week year
# Examples:
#   "0 0 9 * * * *"    - Every day at 9:00 AM
#   "0 0 */6 * * * *"  - Every 6 hours
#   "0 30 8 * * Mon-Fri *" - 8:30 AM on weekdays
cron = "0 0 9 * * * *"

# Timezone for schedule (default: UTC)
timezone = "UTC"

[identity]
# Option 1: Path to file containing private key (nsec or hex format)
# private_key_file = "~/.nostr/private.key"

# Option 2: Inline key (NOT recommended for production!)
# private_key = "nsec1..."

# Note: Environment variable NOSTR_PRIVATE_KEY overrides both options

[messages]
# Message templates to rotate through
templates = [
    "🌅 Good morning! Another day to build something meaningful.",
    "💡 Daily reminder: Small consistent actions lead to big results.",
    "🚀 What are you working on today? Share your progress!",
    "📚 Learning something new? The best time to start was yesterday. The second best time is now.",
]

# Rotation strategy: "sequential" or "random"
rotation = "sequential"

