# ============================================================================
# Nostr Daily Bot - Docker Compose
# ============================================================================
# Usage:
#   docker compose up
# ============================================================================

services:
  db:
    image: postgres:15
    container_name: nostr-daily-bot-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=nostr
      - POSTGRES_PASSWORD=nostr
      - POSTGRES_DB=nostr_daily_bot
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nostr -d nostr_daily_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nostr-daily-bot
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

    ports:
      - "3000:3000"

    environment:
      - DATABASE_URL=postgres://nostr:nostr@db/nostr_daily_bot
      - RUST_LOG=${RUST_LOG:-info}
      - LOG_FORMAT=${LOG_FORMAT:-pretty}

    env_file:
      - path: .env
        required: false

    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
        reservations:
          memory: 32M
          cpus: '0.1'

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    cap_drop:
      - ALL

    security_opt:
      - no-new-privileges:true

volumes:
  db-data:

