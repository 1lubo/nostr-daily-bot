# ============================================================================
# Nostr Daily Bot - Docker Compose
# ============================================================================
# Usage:
#   Development:  docker compose up
#   Production:   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================================

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nostr-daily-bot
    restart: unless-stopped

    # Expose web UI port
    ports:
      - "3000:3000"

    # Persist SQLite database
    volumes:
      - bot-data:/home/nostr/.local/share/nostr-daily-bot

    # Environment variables
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - LOG_FORMAT=${LOG_FORMAT:-pretty}

    # Optional: use .env file for secrets
    env_file:
      - path: .env
        required: false

    # Resource limits (adjust as needed)
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
        reservations:
          memory: 32M
          cpus: '0.1'

    # Logging configuration
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    # Security: drop all capabilities
    cap_drop:
      - ALL

    # Security: no privilege escalation
    security_opt:
      - no-new-privileges:true

volumes:
  bot-data:

