name: Cron Post Due Events

# DISABLED: Workflow temporarily disabled
# on:
#   schedule:
#     # Run every 5 minutes
#     - cron: '*/5 * * * *'
#   # Allow manual trigger for testing
#   workflow_dispatch:

on:
  workflow_dispatch:
    inputs:
      note:
        description: 'Workflow is disabled - manual trigger only'
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  trigger-post:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger post of due events
        run: |
          http_code=$(curl -s -o /dev/null -w "%{http_code}" https://nostrdailybot.fly.dev/api/cron/post)

          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "✅ Success"
          else
            echo "❌ Failed (HTTP $http_code)"
            exit 1
          fi

