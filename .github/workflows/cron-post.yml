name: Cron Post Due Events

on:
  schedule:
    # Run every 5 minutes
    - cron: '*/5 * * * *'
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  trigger-post:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger post of due events
        run: |
          response=$(curl -s -w "\n%{http_code}" https://nostrdailybot.fly.dev/api/cron/post)
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n -1)
          
          echo "Response: $body"
          echo "HTTP Status: $http_code"
          
          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "✅ Success"
          else
            echo "❌ Failed"
            exit 1
          fi

