# fly.toml app configuration file generated for nostrdailybot on 2026-03-10T13:17:46+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'nostrdailybot'
primary_region = 'ams'
kill_signal = 'SIGTERM'
kill_timeout = '2m0s'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
